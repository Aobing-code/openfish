<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenFish - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #38bdf8;
            font-size: 32px;
            font-weight: bold;
        }
        .logo p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .form-group input::placeholder {
            color: #64748b;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #7dd3fc;
        }
        .login-btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .error-msg {
            color: #f87171;
            font-size: 14px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
        .hint {
            color: #64748b;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>OpenFish</h1>
            <p>AI模型路由平台</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入管理员密码" autofocus>
            </div>
            <button type="submit" class="login-btn" id="login-btn">登录</button>
            <div class="error-msg" id="error-msg"></div>
        </form>
        <div class="hint">默认密码: sk-openfish</div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            
            if (!password) {
                errorMsg.textContent = '请输入密码';
                errorMsg.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '登录中...';
            errorMsg.style.display = 'none';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // 登录成功，跳转到首页
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.detail || '登录失败';
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = '网络错误: ' + e.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });

        // 回车提交
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('login-form').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
